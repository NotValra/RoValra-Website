<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Terms of Use for RoValra APIs and services.">
    <title>RoValra - Terms of Use</title>

    <link rel="preload" href="../static/fonts/BuilderSans-Regular-400.otf" as="font" type="font/otf" crossorigin="anonymous">
    <link rel="preload" href="../static/fonts/builderExtended-bold-700_0.otf" as="font" type="font/otf" crossorigin="anonymous">
    <link rel="icon" href="../static/img/GILBERT.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">

    <style>
        .effective-date {
            font-style: italic;
            color: var(--text-muted, #aaa);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="scrolled">
    <div class="background-wrapper">
        <div class="logo-glow"></div>
        <div class="logo-glow-inner"></div>
        <div class="background" id="bg"></div>
        <div class="gradient-mask"></div>
    </div>

    <main class="main-content">
        <div class="container mt-5" style="max-width: 900px;">
            <div id="tou-content"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="../static/js/shared-components.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>

    <script defer>
        const config = { initialBlur: 5, blurDuration: 1, scaleStart: 1.14, scaleEnd: 1, scaleDuration: 2000 };
        const bg = document.getElementById("bg");
        if (bg) {
            bg.style.filter = `blur(${config.initialBlur}px)`;
            setTimeout(() => {
                bg.style.transition = `filter ${config.blurDuration}s ease-out`;
                bg.style.filter = `blur(0px)`;
            }, 50);

            let currentScale = config.scaleStart;
            let scaleStartTime = performance.now();

            function update() {
                const now = performance.now();
                const elapsed = now - scaleStartTime;
                const t = Math.min(elapsed / config.scaleDuration, 1);
                const easeOut = 1 - Math.pow(1 - t, 3);

                currentScale = config.scaleStart + (config.scaleEnd - config.scaleStart) * easeOut;

                bg.style.transform = `translate(-50%, -50%) rotate(-15deg) scale(${currentScale})`;
                requestAnimationFrame(update);
            }
            update();
        }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const touContainer = document.getElementById('tou-content');
            const touUrl = '../static/tou.md';

            marked.setOptions({
                gfm: true,
                breaks: true,
                headerIds: true,
                mangle: false
            });

            touContainer.innerHTML = `
                <div class="text-center opacity-50">
                    <i class="fas fa-circle-notch fa-spin fa-2x mb-3"></i>
                    <p>Loading terms of use...</p>
                </div>`;

            fetch(touUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.text();
                })
                .then(text => {
                    let effectiveDate = '';
                    const dateMatch = text.match(/\*\*(?:Effective Date|Last Updated):\*\* (.*)/i);
                    if (dateMatch) {
                        effectiveDate = `<p class="effective-date">Last updated: ${dateMatch[1]}</p>`;
                        text = text.replace(dateMatch[0], '');
                    }

                    const sectionParts = text.split(/<!-- section:(.*?):(.*?) -->/);
                    
                    let finalHtml = `
                        <div class="privacy-section">
                            <div class="privacy-section-glow"></div>
                            <div class="privacy-section-glow-inner"></div>
                            <div class="section-content">
                                ${marked.parse(sectionParts[0]).replace(/<h1>(.*?)<\/h1>/, `<h1>$1</h1>${effectiveDate}`)}
                            </div>
                        </div>`;
                    
                    for (let i = 1; i < sectionParts.length; i += 3) {
                        const id = sectionParts[i];
                        const icon = sectionParts[i+1];
                        const content = sectionParts[i+2].trim();
                        
                        const titleMatch = content.match(/^##\s+(.*)/);
                        const title = titleMatch ? titleMatch[1] : 'Section';
                        const body = content.replace(/^##\s+.*\n?/, '');

                        finalHtml += `
                            <div class="privacy-section" id="${id}">
                                <div class="privacy-section-glow"></div>
                                <div class="privacy-section-glow-inner"></div>
                                <div class="section-content">
                                    <h2><i class="${icon} me-2"></i> ${title}</h2>
                                    ${marked.parse(body)}
                                </div>
                            </div>
                        `;
                    }
                    touContainer.innerHTML = finalHtml;
                })
                .catch(error => {
                    touContainer.innerHTML = '<div class="text-center opacity-50"><p>Could not load the terms of use. Please try again later.</p></div>';
                });
        });
    </script>
</body>
</html>
